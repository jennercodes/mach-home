name: mach-home

# Full production stack for self-hosting (Coolify / VPS).
# Coolify can consume this file directly; env values come from the panel.
# For plain Docker: copy .env.production.template -> .env and `docker compose up -d --build`.

services:
  postgres:
    # Matches the local dev server (PG 18) so pg_dump/restore stay compatible.
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
      # PG18 images moved the default data layout; pin PGDATA to a subdir of the
      # mount so the named volume behaves the same across major versions.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa} -d ${POSTGRES_DB:-medusa}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Not published to the host by default. Uncomment to run pg_dump/restore
    # against the container from your machine (see scripts/restore-prod-db.sh).
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medusa}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET:?set COOKIE_SECRET}
      # Read by medusa-config.ts; must be passed into the container explicitly.
      DATABASE_SSL: ${DATABASE_SSL:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      # Cloudflare R2 (images already live here — nothing to migrate)
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FILE_URL: ${S3_FILE_URL}
    # No host port publishing: the reverse proxy (Coolify/Traefik) routes to this
    # exposed port over the internal network. Local dev adds ports via
    # docker-compose.override.yml.
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      # NEXT_PUBLIC_* are baked at build time — a rebuild is needed to change them.
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:?set backend URL}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:?set publishable key}
        NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-pe}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Server-side (SSR) talks to the backend over the internal network.
      # The browser uses the baked NEXT_PUBLIC_MEDUSA_BACKEND_URL instead.
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:-http://backend:9000}
    # No host port publishing (see backend). The proxy routes the domain here.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  pgdata:
  redisdata:
